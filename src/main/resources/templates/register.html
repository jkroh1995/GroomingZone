<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" href="../static/css/styles.css">
</head>

<body>
<header>
    <h1 class="logo">회원가입</h1>
    <nav>
        <ul>
            <li><a href="/" class="link">홈</a></li>
            <li><a href="/login" class="link">로그인</a></li>
            <li><a href="/board" class="link">게시판</a></li>
        </ul>
    </nav>
</header>

<main>
    <section>
        <h2>회원가입</h2>
        <form action="/member/register" method="POST">
            <div>
                <label for="name">이름:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div>
                <label for="email">이메일:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="nickname">별명:</label>
                <input type="text" id="nickname" name="nickname" required>
            </div>
            <div>
                <label for="instagram">인스타그램 계정 이름:</label>
                <input type="text" id="instagram" name="instagram" required>
            </div>
            <div>
                <label for="phone">전화번호:</label>
                <input type="text" id="phone" name="phone">
            </div>
            <div>
                <label for="password">비밀번호:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div>
                <label for="category">회원 유형</label>
                <select id="category" name="category">
                    <option value="CUSTOMER">손님</option>
                    <option value="BARBER">바버</option>
                </select>
            </div>
            <button type="submit">회원가입</button>
        </form>
    </section>
</main>

<footer>
    <p>© 2023 회원가입 서비스. All rights reserved.</p>
</footer>
</body>
</html>
